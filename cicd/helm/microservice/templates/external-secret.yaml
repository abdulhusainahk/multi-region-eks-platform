{{/*
ExternalSecret — pulls secrets from AWS Secrets Manager into Kubernetes Secrets
via the External Secrets Operator (ESO).

ESO is deployed cluster-wide by the platform team.
The ClusterSecretStore "aws-secrets-manager" is pre-provisioned via Terraform
with an IRSA role that has read-only access to /clevertap/<env>/<service>/* paths.

Secret rotation: when AWS Secrets Manager rotates a secret, ESO detects the change
within the refreshInterval and updates the Kubernetes secret. The pod picks up the
new value via envFrom/secretRef without requiring a restart (for most frameworks).
For secrets that require a restart (e.g., TLS certificates), annotate the deployment
with reloader.stakater.com/auto: "true" to trigger rolling restarts automatically.
*/}}
{{- if and .Values.externalSecrets.enabled (gt (len .Values.externalSecrets.data) 0) }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "microservice.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecrets.secretStoreName }}
  target:
    name: {{ include "microservice.fullname" . }}-secrets
    creationPolicy: Owner
    # Automatically delete the secret when the ExternalSecret is deleted
    deletionPolicy: Delete
    template:
      type: Opaque
      engineVersion: v2
  data:
    {{- range .Values.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property }}
        {{- end }}
    {{- end }}
{{- end }}
